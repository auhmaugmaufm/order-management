version: '3.9'

services:
  api:
    container_name: event-driven-order-api
    build: .
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=edo_new
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  postgres:
    container_name: edo
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: edo_new
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}